name = "live-tv-api"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain — Cloudflare provisions the DNS record + cert automatically
# on deploy (jetixautomation.com must be an active zone on this account).
routes = [
  { pattern = "tv-api.jetixautomation.com", custom_domain = true }
]

[vars]
ALLOWED_ORIGINS = "*"
HLS_PROXY_ENABLED = "false"

[[kv_namespaces]]
binding = "CATALOG"
id = "2f6fa57c57d843da823189b2955a4abc"

# NOTE: D1 is not currently used by the worker (it reads only from KV).
# If you add D1-backed features later, recreate the binding here and grant
# the API token the "D1:Edit" permission.

[observability]
enabled = true
