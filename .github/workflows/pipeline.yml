name: IPTV Pipeline

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      step:
        description: "Pipeline step (all, discover, validate, merge)"
        required: false
        default: "all"

concurrency:
  group: iptv-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          PIPELINE_STEP: ${{ github.event.inputs.step || 'all' }}
          MAX_VALIDATE: "0"
          # Local timing: ~30ms/url @ concurrency 100 => full 42k pool ~21min,
          # well within the 90min job budget. Big batch = whole pool in ~3 runs.
          VALIDATE_BATCH_SIZE: "15000"
          VALIDATE_CONCURRENCY: "100"
          VALIDATE_TIMEOUT_MS: "6000"
          VALIDATE_RECHECK: "800"
          CRAWL_MAX_NEW: "30"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pipeline:all

      - name: Generate KV bulk file
        run: npm run pipeline:publish-kv

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/catalog.json public/data/kv-bulk.json public/data/epg.json \
            data/pipeline/state.json data/pipeline/validations.json data/pipeline/reports.json \
            data/source-registry.json 2>/dev/null || true
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(pipeline): auto-update channel catalog"
          # The pipeline runs for a long time; the remote may have advanced
          # (manual pushes, other workflows). Rebase + retry so we never fail
          # the run on a non-fast-forward push.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."; sleep $((i * 5))
          done
          echo "::error::Failed to push catalog after retries"; exit 1

      # ---- Publish fresh catalog to Cloudflare so the live app updates ----
      # Use the API worker's KV binding explicitly (repo also has a frontend
      # wrangler.jsonc, so we must point wrangler at wrangler.toml).
      - name: Publish catalog to Cloudflare KV
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler kv bulk put public/data/kv-bulk.json --binding=CATALOG --remote --config wrangler.toml

      - name: Deploy API worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler deploy --config wrangler.toml
