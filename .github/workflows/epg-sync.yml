name: EPG Sync (Phase 2)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  epg:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Fetch iptv-org EPG guides index
        run: |
          mkdir -p public/data/epg
          curl -fsSL "https://iptv-org.github.io/epg/guides.json" -o public/data/epg/guides-index.json || echo "[]" > public/data/epg/guides-index.json

      - name: Commit EPG index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/epg/ || true
          git diff --staged --quiet || git commit -m "chore(epg): update guides index"
          git push
        continue-on-error: true
